<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CineAI</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar" style="background:#000;">
    <a class="nav-logo" href="/">CineAI</a>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Sign In</h1>
      <form id="signin-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required />
        </div>
        <p class="form-error" id="form-error"></p>
        <button type="submit" class="btn btn-red">Sign In</button>
      </form>
      <p class="auth-switch">New to CineAI? <a href="/signup.html">Create account</a></p>
    </div>
  </div>

  <script type="module">
    import { initSignin } from '/js/auth.js';
    initSignin();
  </script>
</body>
</html>
