<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — CineAI</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <nav class="navbar" id="navbar" style="background:#000;">
    <a class="nav-logo" href="/">CineAI</a>
  </nav>

  <div class="auth-page">
    <div class="auth-box">
      <h1>Create Account</h1>
      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. cinefan" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="At least 6 characters" required />
        </div>
        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <input type="password" id="confirm" name="confirm" placeholder="Repeat password" required />
        </div>
        <p class="form-error" id="form-error"></p>
        <button type="submit" class="btn btn-red">Create Account</button>
      </form>
      <p class="auth-switch">Already have an account? <a href="/signin.html">Sign in</a></p>
    </div>
  </div>

  <script type="module">
    import { initSignup } from '/js/auth.js';
    initSignup();
  </script>
</body>
</html>
